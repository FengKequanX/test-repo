<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设施智能巡检系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .detection-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .detection-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        
        .detection-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }
        
        .detection-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2em;
        }
        
        .detection-icon.switch {
            background: #d4edda;
            color: #155724;
        }
        
        .detection-icon.port {
            background: #f8d7da;
            color: #721c24;
        }
        
        .detection-info h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .detection-info p {
            font-size: 0.85em;
            color: #666;
        }
        
        .confidence-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .confidence-high {
            background: #d4edda;
            color: #155724;
        }
        
        .confidence-medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-item .label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }
        
        .status-item .value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        
        .status-online {
            background: #28a745;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        @media (max-width: 968px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 网络设施智能巡检系统</h1>
            <p>基于四足机器人与视觉感知的实时监测平台</p>
        </header>
        
        <div class="dashboard">
            <div class="main-panel">
                <div class="panel">
                    <h2>📹 实时检测画面</h2>
                    <div class="video-container">
                        <img id="video-feed" src="" alt="实时检测画面">
                    </div>
                    
                    <div class="status-bar">
                        <div class="status-item">
                            <div class="label">系统状态</div>
                            <div class="value">
                                <span class="status-indicator status-online"></span>
                                运行中
                            </div>
                        </div>
                        <div class="status-item">
                            <div class="label">帧率 (FPS)</div>
                            <div class="value" id="fps">--</div>
                        </div>
                        <div class="status-item">
                            <div class="label">推理时间</div>
                            <div class="value" id="inference-time">-- ms</div>
                        </div>
                        <div class="status-item">
                            <div class="label">处理帧数</div>
                            <div class="value" id="frame-count">--</div>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button class="btn btn-primary" onclick="exportReport()">📊 导出巡检报告</button>
                        <button class="btn btn-secondary" onclick="clearDetections()">🗑️ 清空检测记录</button>
                    </div>
                </div>
                
                <div class="panel" style="margin-top: 20px;">
                    <h2>📈 检测统计</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>检测到交换机</h3>
                            <div class="value" id="switch-count">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>检测到未插网口</h3>
                            <div class="value" id="port-count">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>总检测目标</h3>
                            <div class="value" id="total-count">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>平均置信度</h3>
                            <div class="value" id="avg-confidence">0%</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="panel">
                    <h2>🔍 检测结果</h2>
                    <div class="detection-list" id="detection-list">
                        <!-- 检测结果将在这里动态显示 -->
                        <div style="text-align: center; padding: 40px; color: #999;">
                            <p>等待检测结果...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="map_viewer.js"></script>
</body>
</html>
